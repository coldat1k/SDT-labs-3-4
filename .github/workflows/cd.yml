name: CD Pipeline (Deploy to Target)

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TARGET_SSH_KEY }}" > ~/.ssh/id_target
          chmod 600 ~/.ssh/id_target
          # Додаємо хост до відомих, щоб конвеєр не запитував підтвердження інтерактивно
          ssh-keyscan -H ${{ secrets.TARGET_HOST }} >> ~/.ssh/known_hosts

      - name: Copy Systemd Unit to Target Node
        run: |
          scp -i ~/.ssh/id_target mywebapp.service ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }}:/tmp/mywebapp.service
          ssh -tt -i ~/.ssh/id_target ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} "sudo mv /tmp/mywebapp.service /etc/systemd/system/mywebapp.service && sudo systemctl daemon-reload"

      - name: Start Database in Docker on Target
        run: |
          ssh -tt -i ~/.ssh/id_target ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} "
            sudo docker run -d --name db --network backend-net \
              -e POSTGRES_DB=inventory_db \
              -e POSTGRES_USER=inventory_user \
              -e POSTGRES_PASSWORD=inventory_password \
              -v pgdata:/var/lib/postgresql/data \
              postgres:15-alpine || sudo docker start db
          "

      - name: Wait for Database to be ready
        run: sleep 5

      - name: Deploy and Restart Web App Container
        run: |
          ssh -tt -i ~/.ssh/id_target ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} "
            sudo systemctl restart mywebapp
            sudo systemctl enable mywebapp
          "

      - name: Verify Deployment
        run: |
          echo "Чекаємо, поки сервіс повністю підніметься..."
          for i in {1..10}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://${{ secrets.TARGET_HOST }}/health/alive || curl -o /dev/null -s -w "%{http_code}" http://${{ secrets.TARGET_HOST }}/)
            echo "Спроба $i: HTTP Status є $STATUS"
            # === ДОДАЄМО ПЕРЕВІРКУ НА 403 ТУТ ===
            if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 302 ] || [ "$STATUS" -eq 404 ] || [ "$STATUS" -eq 403 ]; then
              echo "Деплой успішно верифіковано (додаток відповідає)!"
              exit 0
            fi
            sleep 3
          done
          echo "Верифікація провалена після 10 спроб!"
          exit 1