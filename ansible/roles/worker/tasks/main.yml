---
- name: Create system user app (for running background application)
  user:
    name: app
    shell: /usr/sbin/nologin
    system: yes
    create_home: yes

- name: Create management user operator
  user:
    name: operator
    password: "{{ '12345678' | password_hash('sha512') }}"
    shell: /bin/bash

- name: Configure strict sudo restrictions for operator
  copy:
    dest: /etc/sudoers.d/operator
    content: |
      operator ALL=(ALL) NOPASSWD: /usr/bin/systemctl start cinema, /usr/bin/systemctl stop cinema, /usr/bin/systemctl restart cinema, /usr/bin/systemctl status cinema, /usr/bin/systemctl reload nginx
    mode: '0440'

- name: Install Node.js runtime and Nginx
  apt:
    name:
      - nodejs
      - npm
      - nginx
    state: present

- name: Create application deployment directory
  file:
    path: "/var/www/{{ app_name }}"
    state: directory
    owner: app
    group: app
    mode: '0755'

- name: Generate application environment config with database IP mapping
  template:
    src: env.j2
    dest: "/var/www/{{ app_name }}/.env"
    owner: app
    group: app

- name: Install systemd service unit for Web App
  template:
    src: webapp.service.j2
    dest: "/etc/systemd/system/{{ app_name }}.service"
  notify: reload systemd

- name: Start Web App service
  systemd:
    name: "{{ app_name }}"
    state: started
    enabled: yes
  ignore_errors: "{{ ansible_check_mode }}"

- name: Configure Nginx reverse proxy server block via template
  template:
    src: nginx.conf.j2
    dest: "/etc/nginx/sites-available/{{ app_name }}"
  notify: restart nginx

- name: Enable Nginx server block configuration
  file:
    src: "/etc/nginx/sites-available/{{ app_name }}"
    dest: "/etc/nginx/sites-enabled/{{ app_name }}"
    state: link
    force: yes
  notify: restart nginx

- name: Remove default nginx configuration block
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx